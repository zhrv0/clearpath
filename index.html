/* ── LOCAL STORAGE ──
   Everything lives on this device only — no accounts, no backend, no sync.
   That also means: clearing browser data or switching devices loses it. */
const STORE = {
  profile: "clearpath-profile",
  quests: "clearpath-quests-done",
  tools: "clearpath-tools-done",
  motivations: "clearpath-motivations",
  entries: "clearpath-entries"
};
function loadLocal(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}
function saveLocal(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {}
}

const CSS_VAR_MAP = {
  bg: "--bg",
  surface: "--surface",
  border: "--border",
  borderHi: "--borderhi",
  gold: "--gold",
  goldSoft: "--goldsoft",
  sage: "--sage",
  sageDark: "--sagedark",
  cream: "--cream",
  muted: "--muted",
  mutedLo: "--mutedlo",
  text: "--text",
  textDim: "--textdim",
  red: "--red"
};
let G = {
  ...THEMES.clay
};
function applyTheme(key, persist = true) {
  const t = THEMES[key] || THEMES.clay;
  Object.assign(G, t);
  Object.entries(CSS_VAR_MAP).forEach(([k, cssVar]) => {
    document.documentElement.style.setProperty(cssVar, t[k]);
  });
  if (persist) {
    try {
      localStorage.setItem("clearpath-theme", key);
    } catch (e) {}
  }
}
// Apply any saved theme immediately, before first paint — avoids a flash of the default.
(function initTheme() {
  let saved = null;
  try {
    saved = localStorage.getItem("clearpath-theme");
  } catch (e) {}
  if (saved && THEMES[saved]) applyTheme(saved, false);
})();

// Daily rotation — seeded by date so everyone gets the same quests each day
// and they reset at midnight automatically. 5 per category = 15 quests/day.
function getDailyQuests(pool, count, salt) {
  const today = new Date();
  const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate() + salt;
  const shuffled = [...pool].sort((a, b) => {

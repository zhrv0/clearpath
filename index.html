    // Daily rotation — seeded by date so everyone gets the same quests each day
    // and they reset at midnight automatically
    function getDailyQuests(pool, count, salt) {
      const today = new Date();
      const seed  = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate() + salt;
      const shuffled = [...pool].sort((a, b) => {
        const ha = Math.sin(seed * a.id.charCodeAt(1)) * 10000;
        const hb = Math.sin(seed * b.id.charCodeAt(1)) * 10000;
        return (ha - Math.floor(ha)) - (hb - Math.floor(hb));
      });
      return shuffled.slice(0, count);
    }

    /* ── CALM ── */
    function CalmScreen({ completedTools, completeTool, setPoints, notify }) {
      const [breathing, setBreathing] = useState(false);
      const [phase, setPhase]         = useState(0);
      const [count, setCount]         = useState(4);
      const [cycles, setCycles]       = useState(0);

      useEffect(()=>{
        if(!breathing) return;
        if(cycles>=4){
          setBreathing(false);
          if(!completedTools.includes("breathe")){
            completeTool("breathe");
            setPoints(p=>p+20);
            notify("+20 pts — beautiful breathwork");
          }
          return;
        }
        const t=setInterval(()=>{
          setCount(c=>{
            if(c<=1){
              setPhase(p=>{const n=(p+1)%4; if(n===0)setCycles(cy=>cy+1); return n;});
              return 4;
            }
            return c-1;
          });
        },1000);
        return ()=>clearInterval(t);
      },[breathing,cycles]);

      const handleTool = t => {
        if(t.id==="breathe"){setBreathing(true);setPhase(0);setCount(4);setCycles(0);return;}
        if(completedTools.includes(t.id)){notify("Already done today");return;}
        completeTool(t.id);
        setPoints(p=>p+t.points);
        notify(`+${t.points} pts`);
      };

      return (
        <div style={{paddingBottom:20}}>
          {breathing && (
            <div style={{position:"fixed",inset:0,zIndex:300,display:"flex",flexDirection:"column",
              alignItems:"center",justifyContent:"center",gap:28,
              background:"radial-gradient(ellipse at center,#2a1f0e,#100d06)"}}>
              <Label style={{letterSpacing:8}}>box breathing</Label>
              <div style={{width:200,height:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{
                  width:[160,190,140,160][phase],height:[160,190,140,160][phase],
                  borderRadius:"50%",
                  background:`radial-gradient(circle,${G.gold}44 0%,${G.gold}0a 70%)`,
                  border:`1.5px solid ${G.gold}44`,
                  transition:"all 1.1s cubic-bezier(0.4,0,0.2,1)",
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                  <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:48,color:G.cream,fontWeight:600}}>{count}</p>
                  <Label>{["Breathe In","Hold","Breathe Out","Rest"][phase]}</Label>
                </div>
              </div>
              <p style={{color:G.mutedLo,fontSize:11,letterSpacing:3,fontFamily:"'Lato',sans-serif"}}>CYCLE {cycles+1} OF 4</p>
              <button onClick={()=>setBreathing(false)} style={{
                background:"transparent",border:`1px solid ${G.mutedLo}`,
                color:G.muted,padding:"10px 28px",borderRadius:30,cursor:"pointer",
                fontFamily:"'Lato',sans-serif",fontSize:11,letterSpacing:3}}>CLOSE</button>
            </div>
          )}
          <div style={{padding:"36px 24px 20px"}}><Label style={{marginBottom:8}}>settle the storm</Label><Title size={30}>Calm Garden</Title></div>
          {TOOLS.map(t=>{
            const done=completedTools.includes(t.id);
            return (
              <Card key={t.id} style={{opacity:done?0.52:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
                  <Title size={17}>{t.title}</Title>
                  <span style={{color:G.goldSoft,fontFamily:"'Lato',sans-serif",fontSize:10,fontWeight:700,
                    letterSpacing:1,padding:"4px 10px",borderRadius:20,
                    background:`${G.gold}15`,border:`1px solid ${G.gold}28`,flexShrink:0,marginLeft:8}}>
                    +{t.points}
                  </span>
                </div>
                <p style={{color:G.textDim,fontSize:13,fontFamily:"'Lato',sans-serif",lineHeight:1.55,marginBottom:14}}>{t.desc} — {t.duration}</p>
                <Btn onClick={()=>handleTool(t)} color={done?G.muted:G.gold}>{done?"COMPLETED TODAY":"BEGIN"}</Btn>
              </Card>
            );
          })}
        </div>
      );
    }

                padding:"20px 16px",cursor:"pointer",transition:"all 0.22s"}}>
                <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:s.color,marginBottom:4}}>{s.label}</p>
                <Label style={{color:G.mutedLo}}>{s.sub}</Label>
              </div>
            ))}
          </div>
          <Card style={{borderColor:`${G.sage}25`,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",inset:0,background:`linear-gradient(135deg,${G.sage}05,transparent)`,pointerEvents:"none"}} />
            <Label style={{color:G.sageDark,marginBottom:12}}>today's whisper</Label>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",
              fontSize:18,color:"#c8e8a0",lineHeight:1.8}}>
              "Every sober day is sunlight breaking through the canopy — rare, golden, entirely yours."
            </p>
          </Card>
        </div>
      );
    }

    /* ── ROOT ── */
    function App() {
      const [session, setSession]   = useState(undefined);
      const [user, setUser]         = useState({name:"",bio:"",why:"",avatar:null,points:0,streak:0,soberDays:0,lastCheckIn:null});
      const [tab, setTab]           = useState("home");
      const [doneQuests, setDoneQuests]   = useState([]);
      const [completedTools, setCompletedTools] = useState([]);
      const [motivations, setMotivations] = useState([]);
      const [entries, setEntries]         = useState([]);
      const [toast, setToast]             = useState(null);
      const [loading, setLoading]         = useState(true);

      const notify = msg => { setToast(msg); setTimeout(()=>setToast(null),3800); };

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          if (session) loadAllData(session.user.id);
          else setLoading(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
          if (session) loadAllData(session.user.id);
          else setLoading(false);
        });
        return () => subscription.unsubscribe();
      }, []);

      const loadAllData = async (uid) => {
        setLoading(true);
        const today = new Date().toISOString().split("T")[0];
        const [profileRes, questsRes, toolsRes, motivationsRes, entriesRes] = await Promise.all([
          supabase.from("profiles").select("*").eq("id", uid).single(),
          supabase.from("completed_quests").select("quest_id").eq("user_id", uid).eq("completed_date", today),
          supabase.from("completed_tools").select("tool_id").eq("user_id", uid).eq("completed_date", today),
          supabase.from("motivations").select("*").eq("user_id", uid).order("created_at", {ascending: false}),
          supabase.from("journal_entries").select("*").eq("user_id", uid).order("created_at", {ascending: false}),
        ]);
        if (profileRes.data) {
          const p = profileRes.data;
          // If no check-in ever recorded, treat streak/days as 0 (wipes old demo data)
          const hasRealData = !!p.last_check_in;
          setUser({ name: p.name||"Wanderer", bio: p.bio||"", why: p.why||"",
            avatar: p.avatar_url||null,
            points: hasRealData ? (p.points||0) : 0,
            streak: hasRealData ? (p.streak||0) : 0,
            soberDays: hasRealData ? (p.sober_days||0) : 0,
            lastCheckIn: p.last_check_in||null });
        }
        if (questsRes.data)      setDoneQuests(questsRes.data.map(q => q.quest_id));
        if (toolsRes.data)       setCompletedTools(toolsRes.data.map(t => t.tool_id));
        if (motivationsRes.data) setMotivations(motivationsRes.data);
        if (entriesRes.data)     setEntries(entriesRes.data);
        setLoading(false);
      };

      const saveProfile = async (u) => {
        const s = await supabase.auth.getSession();
        const uid = s.data.session?.user?.id;
        if (!uid) return;
        await supabase.from("profiles").upsert({
          id: uid, name: u.name, bio: u.bio, why: u.why,
          avatar_url: u.avatar, points: u.points,
          streak: u.streak, sober_days: u.soberDays, last_check_in: u.lastCheckIn,
        });
      };

      const setUserAndSave = (fn) => {
        setUser(prev => {
          const next = typeof fn === "function" ? fn(prev) : fn;
          saveProfile(next);
          return next;
        });
      };

      const setPoints = fn => setUserAndSave(u => ({...u, points: fn(u.points)}));

      const completeQuest = async (questId) => {
        if (doneQuests.includes(questId)) return false;
        const today = new Date().toISOString().split("T")[0];
        const s = await supabase.auth.getSession();
        const uid = s.data.session?.user?.id;
        if (uid) await supabase.from("completed_quests").insert({ user_id: uid, quest_id: questId, completed_date: today });
        setDoneQuests(d => [...d, questId]);
        return true;
      };

      const completeTool = async (toolId) => {
        if (completedTools.includes(toolId)) return false;
        const today = new Date().toISOString().split("T")[0];
        const s = await supabase.auth.getSession();
        const uid = s.data.session?.user?.id;
        if (uid) await supabase.from("completed_tools").insert({ user_id: uid, tool_id: toolId, completed_date: today });
        setCompletedTools(t => [...t, toolId]);
        return true;
      };

      const addMotivation = async (motivation) => {
        const s = await supabase.auth.getSession();
        const uid = s.data.session?.user?.id;
        if (!uid) { setMotivations(m => [{id: Date.now(), ...motivation}, ...m]); return; }
        const { data } = await supabase.from("motivations").insert({ user_id: uid, ...motivation }).select().single();
        if (data) setMotivations(m => [data, ...m]);
      };

      const deleteMotivation = async (id) => {
        await supabase.from("motivations").delete().eq("id", id);
        setMotivations(m => m.filter(x => x.id !== id));
      };

      const addEntry = async (entry) => {
        const s = await supabase.auth.getSession();
        const uid = s.data.session?.user?.id;
        if (!uid) { setEntries(e => [{id: Date.now(), ...entry}, ...e]); return; }
        const { data } = await supabase.from("journal_entries").insert({ user_id: uid, ...entry }).select().single();
        if (data) setEntries(e => [data, ...e]);
      };

      const deleteEntry = async (id) => {
        await supabase.from("journal_entries").delete().eq("id", id);
        setEntries(e => e.filter(x => x.id !== id));
      };

      const TABS = [
        {id:"home",label:"Home"},{id:"calm",label:"Calm"},
        {id:"quests",label:"Quests"},{id:"motivations",label:"Why"},
        {id:"notebook",label:"Journal"},{id:"profile",label:"Profile"},
      ];

      const [anonIn, setAnonIn] = useState(false);

      if (loading || session === undefined) return (
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
          background:G.bg,flexDirection:"column",gap:16}}>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,color:G.gold,fontWeight:300}}>ClearPath</p>
          <p style={{fontFamily:"'Lato',sans-serif",fontSize:10,letterSpacing:4,color:G.mutedLo}}>LOADING...</p>
        </div>
      );

      if (!session && !anonIn) return <LoginScreen onLogin={(name) => {
        setUser(u => ({...u, name: name||"Wanderer", points:0, streak:0, soberDays:0}));
        setAnonIn(true);
      }} />;

      return (
        <div style={{minHeight:"100vh",maxWidth:430,margin:"0 auto",
          background:`radial-gradient(ellipse at 50% -5%,#281e08 0%,${G.bg} 60%)`,
          paddingBottom:80,position:"relative"}}>
          <div style={{position:"fixed",top:-100,left:-80,width:380,height:380,
            borderRadius:"50%",pointerEvents:"none",zIndex:0,
            background:"radial-gradient(circle,rgba(212,168,85,0.09) 0%,transparent 70%)",
            animation:"orbDrift 9s ease-in-out infinite"}} />
          {toast && <Toast msg={toast} />}
          <div style={{animation:"riseIn 0.4s ease",position:"relative",zIndex:1}}>
            {tab==="home"        && <HomeScreen user={user} setUser={setUserAndSave} notify={notify} setTab={setTab} />}
            {tab==="calm"        && <CalmScreen completedTools={completedTools} completeTool={completeTool} setPoints={setPoints} notify={notify} />}
            {tab==="quests"      && <QuestsScreen done={doneQuests} completeQuest={completeQuest} setUserAndSave={setUserAndSave} user={user} notify={notify} />}
            {tab==="motivations" && <MotivationsScreen motivations={motivations} addMotivation={addMotivation} deleteMotivation={deleteMotivation} />}
            {tab==="notebook"    && <NotebookScreen entries={entries} addEntry={addEntry} deleteEntry={deleteEntry} />}
            {tab==="profile"     && <ProfileScreen user={user} setUser={setUserAndSave} />}
          </div>
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
            width:"100%",maxWidth:430,zIndex:100,
            background:`linear-gradient(0deg,rgba(14,12,8,0.98) 70%,transparent)`,
            borderTop:`1px solid ${G.border}`,display:"flex",padding:"10px 0 16px"}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} className="tab-btn" style={{
                flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5,
                padding:"6px 0",background:"transparent",border:"none",cursor:"pointer",
                transition:"color 0.2s",color:tab===t.id?G.gold:G.mutedLo}}>
                <div style={{width:4,height:4,borderRadius:"50%",marginBottom:2,
                  background:tab===t.id?G.gold:"transparent",transition:"background 0.2s"}} />
                <span style={{fontFamily:"'Lato',sans-serif",fontSize:8,letterSpacing:2,
                  fontWeight:tab===t.id?700:400}}>{t.label.toUpperCase()}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
